<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petbottle App Integration</title>
    <link rel="stylesheet" href="./src/styles/main.css">

    <style>
        /* Demo Specific Overrides and Transitions */
        body {
            margin: 0;
            overflow: hidden;
            font-family: var(--font-family-sans, sans-serif);
            background-color: var(--bg-body, #1e1e1e);
            color: var(--text-main, #d4d4d4);
            transition: background-color var(--transition-normal), color var(--transition-normal);
        }

        /* Screen Management */
        #login-screen,
        #app-screen {
            opacity: 0;
            visibility: hidden;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            transition: opacity var(--transition-normal) ease, visibility var(--transition-normal);
        }

        .screen-active {
            opacity: 1 !important;
            visibility: visible !important;
            position: relative !important;
            z-index: 10;
        }

        /* Custom Layout Adjustments */
        .app-container {
            /* app.css defines grid. We overwrite to include a 25px gap between sidebar and workspace */
            grid-template-columns: var(--sidebar-width, 260px) 1fr;
            gap: 25px;
            padding-right: 25px;
            /* balance out the visual gap */
            background-color: var(--bg-body);
            /* Body bg behind the gap */
        }

        /* Sidebar Transitions */
        .app-container.sidebar-collapsed {
            /* The grid collapses the sidebar column to 0, shifting workspace left */
            grid-template-columns: 0px 1fr;
            gap: 0;
            /* Removing gap when collapsed so workspace expands fully */
            padding-left: 50px;
            /* Room for the uncollapse hamburger menu */
        }

        .sidebar {
            transition: transform var(--transition-smooth), opacity var(--transition-smooth);
            border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
            margin: 10px 0 10px 0;
            /* Floating effect */
            box-shadow: var(--shadow-sm);
        }

        .app-container.sidebar-collapsed .sidebar {
            transform: translateX(-100%);
            opacity: 0;
        }

        .main-content {
            background-color: var(--bg-app);
            border-radius: var(--radius-lg);
            margin: 10px 0;
            /* Matching sidebar floating effect */
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-subtle);
            transition: all var(--transition-smooth);
        }

        /* Floating Re-open Toggle */
        .floating-toggle {
            position: absolute;
            left: 10px;
            top: 20px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 15px;
            opacity: 0;
            visibility: hidden;
            transform: translateX(-20px);
            transition: all var(--transition-smooth);
        }

        .app-container.sidebar-collapsed .floating-toggle {
            opacity: 1;
            visibility: visible;
            transform: translateX(0);
        }

        /* Settings Modal / Overlay */
        /* Using petbottle modals.css styling via classes below normally, but providing an overlay here */
        .settings-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            backdrop-filter: blur(4px);
            transition: all var(--transition-normal);
        }

        .settings-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .settings-modal {
            width: 450px;
            max-width: 90vw;
            background: var(--bg-app);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: var(--space-6);
            box-shadow: var(--shadow-lg);
            transform: scale(0.95) translateY(10px);
            transition: all var(--transition-normal);
        }

        .settings-overlay.open .settings-modal {
            transform: scale(1) translateY(0);
        }

        /* Toast Container Override (Bottom Right) */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 9999;
            pointer-events: none;
        }

        /* Custom smaller Command Panel */
        .custom-command-panel {
            position: absolute;
            width: 250px;
            /* Small footprint */
            z-index: 50;
            margin-top: 10px;
            /* Underneath the block */
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            background: var(--bg-app);
            display: none;
            /* Utilizing slideUp keyframes from animations.css */
            animation: slideUp var(--transition-smooth) cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .custom-command-panel.active {
            display: flex;
            flex-direction: column;
        }

        /* Block styling for demo */
        .editor-block {
            position: relative;
            padding: 10px;
            margin-bottom: 5px;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            transition: border-color 0.2s;
        }

        .editor-block:hover {
            border-color: var(--border-subtle);
        }

        .editor-block:focus-within {
            border-color: var(--brand-light);
        }

        [contenteditable="true"]:empty:before {
            content: attr(data-placeholder);
            color: var(--text-muted);
            cursor: text;
        }

        [contenteditable="true"]:focus {
            outline: none;
        }
    </style>
</head>

<body>

    <!-- Screen 1: Login -->
    <div id="login-screen" class="screen-active auth-wrapper">
        <div class="auth-container">
            <div class="auth-header">
                <h2 class="auth-title">Petbottle Workspace</h2>
                <p class="auth-subtitle">Welcome back! Please login.</p>
            </div>
            <form class="auth-form" id="login-form">
                <div class="auth-form-group">
                    <label class="auth-label" for="login-email">Email</label>
                    <input type="text" id="login-email" class="form-input" placeholder="deneme@mail" required>
                </div>
                <div class="auth-form-group">
                    <label class="auth-label" for="login-password">Password</label>
                    <input type="password" id="login-password" class="form-input" placeholder="123" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 1rem;">Sign
                    In</button>
            </form>
        </div>
    </div>

    <!-- Screen 2: Admin Layout -->
    <div id="app-screen">
        <div class="app-container" id="main-layout">

            <!-- Floating Sidebar Reopen & Settings Toggle (Visible only when sidebar collapsed) -->
            <div class="floating-toggle">
                <button class="btn btn-icon btn-secondary" id="uncollapse-sidebar" title="Open Sidebar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12h18M3 6h18M3 18h18" />
                    </svg>
                </button>
                <button class="btn btn-icon btn-ghost" id="floating-settings-btn" title="Settings">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                        </path>
                    </svg>
                </button>
            </div>

            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <span>Petbottle Docs</span>
                    <div class="sidebar-actions">
                        <!-- Sidebar Close Toggle -->
                        <button class="btn btn-icon btn-ghost" id="collapse-sidebar" title="Close Sidebar">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="15 18 9 12 15 6"></polyline>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="file-list">
                    <!-- Mock files -->
                    <div class="file-item drag-over">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z">
                            </path>
                        </svg>
                        Getting Started
                    </div>
                    <!-- Nested Items -->
                    <div class="file-item" style="padding-left: calc(var(--space-3) + 20px);">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>
                        Introduction
                    </div>
                    <div class="file-item" style="padding-left: calc(var(--space-3) + 20px);">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>
                        Installation
                    </div>
                    <div class="file-item">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>
                        Architecture
                    </div>
                    <div class="file-item">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>
                        API Reference
                    </div>
                </div>

                <div class="sidebar-footer">
                    <button class="btn btn-secondary" id="sidebar-settings-btn"
                        style="width: 100%; justify-content: flex-start;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                            </path>
                        </svg>
                        Settings
                    </button>
                </div>
            </aside>

            <!-- Workspace (Main Content) -->
            <main class="main-content">
                <div style="padding: 40px; max-width: 800px; margin: 0 auto 0 30px; width: 100%;">
                    <h1 style="color: var(--text-main); font-size: 2.5rem; margin-bottom: 2rem;">Getting Started</h1>

                    <div class="editor-block">
                        <h2 style="margin:0; font-size: 1.5rem;">Welcome to the Petbottle Editor</h2>
                    </div>

                    <!-- Interactive Editor Block mimicking Notion -->
                    <div class="editor-block" style="position: relative;">
                        <div contenteditable="true" class="slash-trigger-input text-node"
                            data-placeholder="Type '/' for commands"
                            style="min-height: 24px; padding: 4px; display:block; outline: none; font-size: 1rem; line-height: 1.5; color: var(--text-main);">
                        </div>

                        <!-- Custom Command Panel attached directly below this block -->
                        <div class="command-panel custom-command-panel" id="slash-menu">
                            <!-- Reusing command-panel.css structures but compacting it via inline overrides or custom wrapper -->
                            <div class="cmd-list" style="max-height: 250px; overflow-y: auto;">
                                <div class="cmd-group">
                                    <div class="cmd-group-title"
                                        style="padding: 8px 12px; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase;">
                                        Basic blocks</div>

                                    <div class="cmd-item" onclick="insertBlock('Text')">
                                        <div class="cmd-icon"><svg width="16" height="16" viewBox="0 0 24 24"
                                                fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M4 7V4h16v3M9 20h6M12 4v16" />
                                            </svg></div>
                                        <div class="cmd-content">
                                            <div class="cmd-title" style="font-size: 0.9rem;">Text</div>
                                        </div>
                                    </div>

                                    <div class="cmd-item" onclick="insertBlock('Heading 1')">
                                        <div class="cmd-icon">
                                            <h3 style="margin:0; font-size:16px;">H1</h3>
                                        </div>
                                        <div class="cmd-content">
                                            <div class="cmd-title" style="font-size: 0.9rem;">Heading 1</div>
                                        </div>
                                    </div>

                                    <div class="cmd-item" onclick="insertBlock('Quote')">
                                        <div class="cmd-icon"><svg width="16" height="16" viewBox="0 0 24 24"
                                                fill="none" stroke="currentColor" stroke-width="2">
                                                <path
                                                    d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1.5.5 1.5 1.5L5 15c0 1.5.5 2.5 3 2.5h-.5C5 17.5 3 19 3 21zm14 0c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1.5.5 1.5 1.5L19 15c0 1.5.5 2.5 3 2.5h-.5c-2.5 0-4.5 1.5-4.5 3z" />
                                            </svg></div>
                                        <div class="cmd-content">
                                            <div class="cmd-title" style="font-size: 0.9rem;">Quote</div>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </div>

                    </div>

                </div>
            </main>
        </div>
    </div>

    <!-- Settings Modal Overlay -->
    <div class="settings-overlay" id="settings-modal-overlay">
        <div class="settings-modal">
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 12px;">
                <h2 style="margin: 0; font-size: 1.25rem;">Account Settings</h2>
                <button class="btn btn-icon btn-ghost" id="close-settings" title="Close">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <div style="display: flex; flex-direction: column; gap: 20px;">
                <!-- Pre-filled Account Info Preview -->
                <div>
                    <label
                        style="font-size: 12px; font-weight: 500; color: var(--text-muted); display: block; margin-bottom: 4px;">Email
                        (Logged in as)</label>
                    <input type="text" class="form-input" value="deneme@mail" disabled>
                </div>

                <div>
                    <label
                        style="font-size: 12px; font-weight: 500; color: var(--text-muted); display: block; margin-bottom: 4px;">Theme
                        Profile</label>
                    <select id="app-theme-select" class="form-input">
                        <option value="light">Light</option>
                        <option value="dark" selected>Dark</option>
                        <option value="forest">Forest</option>
                        <option value="ocean">Ocean</option>
                        <option value="sunset">Sunset</option>
                    </select>
                </div>

                <div style="border-top: 1px dashed var(--border-subtle); padding-top: 20px;">
                    <h3 style="font-size: 0.95rem; margin-bottom: 12px; color: var(--text-main);">Change Password</h3>
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <input type="password" class="form-input" placeholder="New password">
                        <button class="btn btn-secondary"
                            onclick="showToast('Password updated dummy process!', 'success')">Update</button>
                    </div>
                </div>

                <div style="border-top: 1px solid var(--danger); padding-top: 20px; text-align: right;">
                    <h3 style="font-size: 0.95rem; margin-bottom: 12px; color: var(--text-main); text-align: left;">
                        Danger Zone</h3>
                    <button class="btn btn-danger"
                        onclick="showToast('Are you sure? This action is permanent!', 'error')">Delete Account</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Client-side Logic -->
    <script>
        /* Toast System using petbottle variables */
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');

            // Inherit visual style from petbottle variables directly
            let bgColor = 'var(--bg-app)';
            let borderColor = 'var(--border-subtle)';
            let iconColor = 'var(--text-muted)';

            if (type === 'success') {
                borderColor = 'var(--brand-main)';
                iconColor = 'var(--brand-main)';
            } else if (type === 'error') {
                borderColor = 'var(--danger)';
                iconColor = 'var(--danger)';
            }

            toast.style.cssText = `
        background-color: ${bgColor};
        color: var(--text-main);
        border: 1px solid ${borderColor};
        border-radius: var(--radius-md);
        padding: 12px 16px;
        box-shadow: var(--shadow-lg);
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 0.9rem;
        pointer-events: auto;
        transform: translateX(120%);
        opacity: 0;
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
      `;

            toast.innerHTML = `
        <div style="color: ${iconColor}">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 16 12 12 12 8"></polyline><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        </div>
        <div>${message}</div>
      `;

            container.appendChild(toast);

            // Animate In
            requestAnimationFrame(() => {
                toast.style.transform = 'translateX(0)';
                toast.style.opacity = '1';
            });

            // Animate Out & Remove
            setTimeout(() => {
                toast.style.transform = 'translateY(20px)';
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        /* Auth Logic */
        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;

            if (email === 'deneme@mail' && pass === '123') {
                // Transition screens
                document.getElementById('login-screen').classList.remove('screen-active');
                const appScreen = document.getElementById('app-screen');
                appScreen.classList.add('screen-active');

                // Minor delay to let modal transition end before flashing toasts
                setTimeout(() => showToast('Giriş başarılı! Hoşgeldiniz.', 'success'), 300);
            } else {
                showToast('Hatalı e-posta veya şifre.', 'error');
            }
        });

        /* Sidebar Toggles */
        const appLayout = document.getElementById('main-layout');

        document.getElementById('collapse-sidebar').addEventListener('click', () => {
            appLayout.classList.add('sidebar-collapsed');
        });

        document.getElementById('uncollapse-sidebar').addEventListener('click', () => {
            appLayout.classList.remove('sidebar-collapsed');
        });

        /* Settings Modal Toggles */
        const settingsModal = document.getElementById('settings-modal-overlay');

        function openSettings() {
            settingsModal.classList.add('open');
        }
        document.getElementById('sidebar-settings-btn').addEventListener('click', openSettings);
        document.getElementById('floating-settings-btn').addEventListener('click', openSettings);

        document.getElementById('close-settings').addEventListener('click', () => {
            settingsModal.classList.remove('open');
        });

        // Close modal on outside click
        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) {
                settingsModal.classList.remove('open');
            }
        });

        /* Theme Switcher */
        document.getElementById('app-theme-select').addEventListener('change', (e) => {
            document.documentElement.setAttribute('data-theme', e.target.value);
            showToast(`Tema başarıyla '${e.target.value}' yapıldı.`);
        });

        /* Command Panel Slash Trigger Logic */
        const triggerInput = document.querySelector('.slash-trigger-input');
        const slashMenu = document.getElementById('slash-menu');

        triggerInput.addEventListener('keyup', function (e) {
            const text = this.innerText || this.textContent;
            if (text.trim().endsWith('/')) {
                slashMenu.classList.add('active');

                // Position it right below the cursor conceptually (for this demo it's anchored relative to block)
            } else if (text.trim() === '' || e.key === 'Escape' || e.key === 'Backspace') {
                if (!text.includes('/')) {
                    slashMenu.classList.remove('active');
                }
            }
        });

        // Hide panel on outside click
        document.addEventListener('click', (e) => {
            if (!triggerInput.contains(e.target) && !slashMenu.contains(e.target)) {
                slashMenu.classList.remove('active');
            }
        });

        function insertBlock(type) {
            showToast(type + ' inserted!', 'success');
            slashMenu.classList.remove('active');
            triggerInput.innerText = ''; // clear slate
        }

    </script>
</body>

</html>
